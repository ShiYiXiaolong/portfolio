<!DOCTYPE html>
<html lang="de" class="theme-light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Daniela Reich | Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../index.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-surface);
            padding: 2rem;
        }
        .login-card {
            background: var(--bg-main);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .login-title {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--text-heading);
        }
        .login-subtitle {
            color: var(--text-muted);
            margin-bottom: 2.5rem;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-main);
        }
        .form-input {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-surface);
            color: var(--text-main);
            font-family: inherit;
            transition: all 0.3s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--glow-color);
        }
        .btn-login {
            width: 100%;
            padding: 1rem;
            border-radius: 12px;
            background: var(--accent);
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        .btn-login:hover {
            background: var(--accent-dark);
            transform: translateY(-2px);
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-decoration: none;
        }
        .back-link:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="blob-bg"></div>
    <div class="login-card">
        <h1 class="login-title">Admin Login</h1>
        <p class="login-subtitle">Anmeldung zur Verwaltung der Ordination</p>
        
        <form onsubmit="event.preventDefault();">
            <div class="form-group">
                <label class="form-label">Benutzername</label>
                <input type="text" class="form-input" placeholder="Admin">
            </div>
            <div class="form-group">
                <label class="form-label">Passwort</label>
                <input type="password" class="form-input" placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login">Anmelden</button>
        </form>
        
        <a href="../index.html" class="back-link">← Zurück zur Website</a>
    </div>
</body>
</html>
